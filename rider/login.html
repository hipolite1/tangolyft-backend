<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rider Login - TangoLyft</title>
  <link rel="stylesheet" href="./rider.css" />
</head>
<body>

  <div class="container">
    <div class="card">

      <h1>Rider Login</h1>
      <p class="subtitle">
        Enter your phone number to receive an OTP and access TangoLyft rider services.
      </p>

      <div id="message"></div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="+2348012345678" />
      </div>

      <button id="sendOtpBtn" class="btn-primary">
        Send OTP
      </button>

      <div id="otpSection" style="display:none; margin-top:20px;">
        <div class="form-group">
          <label>OTP Code</label>
          <input type="text" id="otp" placeholder="Enter OTP" />
        </div>

        <button id="verifyOtpBtn" class="btn-primary">
          Verify & Continue
        </button>
      </div>

      <p style="margin-top:20px;">
        <a href="./request.html">Back to request page</a>
      </p>

    </div>
  </div>

  <script src="./rider-login.js"></script>
</body>
</html>
