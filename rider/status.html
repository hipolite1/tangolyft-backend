<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trip Status - TangoLyft</title>
  <link rel="stylesheet" href="./rider.css" />
</head>
<body>

  <div class="container">
    <div class="card">

      <div class="rider-nav">
        <a href="./login.html">Login</a>
        <a href="./request.html">Request Trip</a>
        <a href="./status.html">Trip Status</a>
        <button id="riderLogoutBtn" type="button">Logout</button>
      </div>

      <h1>Check Trip Status</h1>
      <p class="subtitle">
        Enter your phone number to view your latest TangoLyft trip.
      </p>

      <div id="message"></div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="statusPhone" placeholder="2348032840615" />
      </div>

      <button id="checkStatusBtn" class="btn-primary">
        Check Status
      </button>

      <hr style="margin:30px 0;" />

      <div id="tripStatusCard">
        No trip loaded yet.
      </div>

      <p style="margin-top:20px;">
        <a href="./request.html">Request a new trip</a>
      </p>

    </div>
  </div>

  <script src="./rider.js"></script>
</body>
</html>
