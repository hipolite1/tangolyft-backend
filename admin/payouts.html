<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TangoLyft Admin - Payouts</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body data-page="payouts">
  <div class="layout">
    <aside class="sidebar">
      <h2>TangoLyft Admin</h2>
      <nav>
        <a class="nav-link" href="./pending-drivers.html">Pending Drivers</a>
        <a class="nav-link" href="./approved-drivers.html">Approved Drivers</a>
        <a class="nav-link" href="./trips.html">Trips</a>
        <a class="nav-link active" href="./payouts.html">Payouts</a>
      </nav>
      <button id="logoutBtn" class="btn danger full">Logout</button>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <h1>Driver Cashout Requests</h1>
          <p class="muted">Review and mark driver cashout requests as paid</p>
        </div>
        <button id="refreshBtn" class="btn primary">Refresh</button>
      </div>

      <div id="status" class="status"></div>

      <div class="card">
        <div id="emptyState" class="empty-state" style="display:none;">
          No pending cashout requests.
        </div>

        <div class="table-wrap">
          <table id="payoutsTable">
            <thead>
              <tr>
                <th>Payout ID</th>
                <th>Driver Phone</th>
                <th>Driver Name</th>
                <th>Amount</th>
                <th>Wallet Balance</th>
                <th>Status</th>
                <th>Requested</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="payoutsTbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
