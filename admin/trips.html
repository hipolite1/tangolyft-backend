<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TangoLyft Admin - Trips</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body data-page="trips">
  <div class="layout">
    <aside class="sidebar">
      <h2>TangoLyft Admin</h2>
      <<nav>
  <a class="nav-link" href="./pending-drivers.html">Pending Drivers</a>
  <a class="nav-link" href="./approved-drivers.html">Approved Drivers</a>
  <a class="nav-link active" href="./trips.html">Trips</a>
</nav>
      <button id="logoutBtn" class="btn danger full">Logout</button>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <h1>Trips</h1>
          <p class="muted">Monitor trip activity and status</p>
        </div>
        <button id="refreshBtn" class="btn primary">Refresh</button>
      </div>

      <div id="status" class="status"></div>

      <div class="card">
        <div id="emptyState" class="empty-state" style="display:none;">
          No trips found.
        </div>

        <table id="tripsTable">
  <thead>
    <tr>
      <th>Trip ID</th>
      <th>Rider Phone</th>
      <th>City</th>
      <th>Service Type</th>
      <th>Status</th>
      <th>Commitment</th>
      <th>Driver</th>
      <th>Requested At</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tripsTbody"></tbody>
</table>

  <script src="./admin.js"></script>
</body>
</html>
