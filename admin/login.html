<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TangoLyft Admin Login</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body data-page="login">
  <div class="page-wrap">
    <div class="card auth-card">
      <h1>TangoLyft Admin</h1>
      <p class="muted">Login with phone and OTP</p>

      <label for="phone">Phone Number</label>
      <input id="phone" type="text" placeholder="2348032840688" />

      <div class="row gap">
        <button id="requestOtpBtn" class="btn primary">Request OTP</button>
      </div>

      <label for="otp">OTP</label>
      <input id="otp" type="text" placeholder="Enter OTP" />

      <div class="row gap">
        <button id="verifyOtpBtn" class="btn success">Verify & Login</button>
      </div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
